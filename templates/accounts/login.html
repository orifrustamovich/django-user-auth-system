{% extends 'base.html' %}
{% load crispy_forms_tags %}

    {% block content %}
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-outline-primary" type="submit">Login</button>
            <a class="btn btn-outline-danger" href="{% url 'password_reset'  %}" role="button">Forgot Password</a>

        </form>
    {% endblock content %}
